<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>창원경일고 진로진학 통합 허브</title>
  <meta name="description" content="창원경일고등학교 학생·학부모·교사를 위한 진로진학 및 학업지원 통합 자료실" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-school">창원경일고등학교 · 진로진학상담부</div>
    <h1 class="header-title">진로진학 통합 허브</h1>
    <p class="header-desc">입시자료, 교육과정 자료, 진학 탐색 도구, AI 기반 탐구·세특·면접 지원 도구를 한 곳에 모은 통합 자료실</p>
  </div>
</header>

<div class="sticky-bar">
  <div class="sticky-inner">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" id="searchInput" placeholder="자료 검색 (제목, 설명, 태그)" autocomplete="off" />
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" data-section="all">전체</button>
      <button class="filter-btn" data-section="admission">수시 입시</button>
      <button class="filter-btn" data-section="curriculum">교육과정</button>
      <button class="filter-btn" data-section="ai-tools">AI 도우미</button>
      <button class="filter-btn" data-section="career-data">진로 데이터</button>
      <button class="filter-btn filter-btn-personal" data-section="personal">🔒 개인</button>
    </div>
  </div>
</div>

<main class="main">
  <div class="quick-section">
    <div class="quick-title">⚡ 자주 쓰는 자료</div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>
  <div class="hub-divider"></div>
  <div id="sectionsContainer"></div>
  <div class="no-result" id="noResult">검색 결과가 없습니다. 다른 키워드로 검색해 보세요.</div>
</main>

<footer class="site-footer">
  <p id="lastUpdated" style="font-weight:500;color:#4a5568;"></p>
  <p>외부 링크(GPTs, Gemini)는 해당 서비스 로그인이 필요할 수 있습니다.</p>
  <p style="margin-top:8px;">창원경일고등학교 진로진학상담부</p>
</footer>

<script src="data.js"></script>
<script src="script.js"></script>

<!-- 비밀번호 모달 -->
<div id="pw-modal" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:32px 28px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.18);text-align:center;">
    <div style="font-size:32px;margin-bottom:12px;">🔒</div>
    <div style="font-size:16px;font-weight:700;color:#1a2332;margin-bottom:6px;">개인 자료</div>
    <div style="font-size:13px;color:#8a96a8;margin-bottom:20px;">비밀번호를 입력하세요</div>
    <input id="pw-input" type="password" placeholder="비밀번호"
      style="width:100%;padding:10px 14px;border:1.5px solid #dde3ea;border-radius:8px;font-size:15px;text-align:center;letter-spacing:4px;outline:none;font-family:inherit;margin-bottom:8px;" />
    <div id="pw-error" style="display:none;font-size:12px;color:#dc2626;margin-bottom:8px;">비밀번호가 틀렸습니다.</div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button onclick="closePwModal()"
        style="flex:1;padding:10px;border:1.5px solid #dde3ea;border-radius:8px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#4a5568;font-family:inherit;">취소</button>
      <button onclick="confirmPw()"
        style="flex:1;padding:10px;border:none;border-radius:8px;background:#1a3a5c;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">확인</button>
    </div>
  </div>
</div>
</body>
</html>
